name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_HUB_REPO: ramonoemxx/dailyexpensereport
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_HUB_REPO }}:main-latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            sudo bash -c '
              cd /root/opt/traefik/project/dailyexpensereport &&
              echo "Pulling new image from Docker Hub..." &&
              docker compose pull app &&
              echo "Running database migrations..." &&
              docker compose run --rm app sh -c "npx prisma migrate deploy" &&
              echo "Recreating container with new image..." &&
              docker compose up -d --force-recreate app &&
              echo "Cleaning up old images..." &&
              docker image prune -f
            '
